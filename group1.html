<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group 1 Members</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* 🌈 AUTO CHANGING BACKGROUND */
body {
  background: linear-gradient(-45deg, #0f2027, #203a43, #000000, #00c6ff);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
  color: white;
  text-align: center;
  overflow-x: hidden;
  transition: 0.5s;
}

@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* TITLE */
h1 {
  margin-top: 40px;
  font-size: 42px;
  letter-spacing: 4px;
  text-shadow: 0 0 15px cyan;
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 35px;
  margin-top: 60px;
  padding: 20px;
}

/* CARD */
.card {
  width: 240px;
  height: 320px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  position: relative;
  overflow: hidden;
  transition: 0.3s;
  cursor: pointer;
  box-shadow: 0 0 25px rgba(0,255,255,0.15);
}

/* BORDER */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 20px;
  padding: 2px;
  background: linear-gradient(45deg, cyan, magenta, yellow);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
}

/* HOVER */
.card:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 0 40px cyan;
}

/* IMAGE */
.card img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin-top: 25px;
  border: 3px solid cyan;
}

/* NAME */
.name {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
  color: cyan;
}

/* RIPPLE */
.card::after {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  background: rgba(0,255,255,0.3);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  transition: 0.4s;
}

.card:active::after {
  width: 300px;
  height: 300px;
  opacity: 0;
}

/* BACK BUTTON */
.back-btn {
  display: inline-block;
  margin: 60px 0;
  padding: 12px 35px;
  border-radius: 30px;
  background: linear-gradient(45deg, cyan, magenta);
  text-decoration: none;
  color: white;
  font-weight: bold;
  box-shadow: 0 0 20px cyan;
  transition: 0.3s;
}

.back-btn:hover {
  transform: scale(1.1);
}

/* FADE */
.fade-out {
  animation: fadeOut 0.4s forwards;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    transform: scale(1.1);
  }
}
</style>
</head>

<body>

<h1>GROUP 1 MEMBERS</h1>

<div class="container">

  <div class="card" onclick="goToPage('edelynchochesa.html','#ff6a00')">
    <img src="edelyn.jpg">
    <div class="name">Edelyn</div>
  </div>

  <div class="card" onclick="goToPage('jamaicasinangote.html','#8e2de2')">
    <img src="jamaica.jpg">
    <div class="name">Jamaica</div>
  </div>

  <div class="card" onclick="goToPage('jomarisingzon.html','#00c6ff')">
    <img src="jomari.jpg">
    <div class="name">Jomari</div>
  </div>

  <div class="card" onclick="goToPage('renalynjabuen.html','#ff0080')">
    <img src="renalyn.jpg">
    <div class="name">Renalyn</div>
  </div>

  <div class="card" onclick="goToPage('ricacautiver.html','#00ff87')">
    <img src="rica.jpg">
    <div class="name">Rica</div>
  </div>

</div>

<a href="index.html" class="back-btn">← Back</a>

<script>
function goToPage(link, color) {

  // 🎨 change background based sa member
  document.body.style.background = color;

  // remove animation para dili mag conflict
  document.body.style.animation = "none";

  // fade effect
  document.body.classList.add("fade-out");

  setTimeout(() => {
    window.location.href = link;
  }, 400);
}
</script>

</body>
</html>
