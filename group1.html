<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group 1 Members</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 30px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
  padding: 30px;
}

/* CARD */
.card {
  width: 180px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  padding: 15px;
  transition: 0.3s;
  animation: fadeIn 1s ease;
}

.card:hover {
  transform: translateY(-10px);
}

/* IMAGE */
.card img {
  width: 100%;
  border-radius: 10px;
}

/* NAME */
.name {
  background: linear-gradient(45deg, #f9d423, #ff4e50);
  padding: 6px 12px;
  border-radius: 10px;
  font-size: 14px;
  margin-top: 10px;
  display: inline-block;
  color: black;
  font-weight: bold;
}

/* BACK BUTTON */
.back-btn {
  display: inline-block;
  margin: 30px 0;
  padding: 8px 20px;
  font-size: 14px;
  border-radius: 20px;
  background: linear-gradient(45deg, #ff512f, #dd2476);
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.back-btn:hover {
  transform: scale(1.1);
}

/* ANIMATION */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>

<body>

<h1>GROUP 1 MEMBERS</h1>

<div class="container">

  <div class="card">
    <img src="edelyn.jpg">
    <div class="name">Edelyn</div>
  </div>

  <div class="card">
    <img src="jamaica.jpg">
    <div class="name">Jamaica</div>
  </div>

  <div class="card">
    <img src="jomari.jpg">
    <div class="name">Jomari</div>
  </div>

  <div class="card">
    <img src="renalyn.jpg">
    <div class="name">Renalyn</div>
  </div>

  <div class="card">
    <img src="rica.jpg">
    <div class="name">Rica</div>
  </div>

</div>

<a href="index.html" class="back-btn">← Back</a>

</body>
</html>
