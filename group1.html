<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group 1 Members</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* 🌈 AUTO BACKGROUND */
body {
  background: linear-gradient(-45deg, #0f2027, #203a43, #000000, #00c6ff);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
  color: white;
  text-align: center;
}

@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* TITLE */
h1 {
  margin-top: 40px;
  font-size: 42px;
  letter-spacing: 4px;
  text-shadow: 0 0 15px cyan;
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 35px;
  margin-top: 60px;
}

/* CARD */
.card {
  width: 240px;
  height: 320px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  position: relative;
  overflow: hidden;
  transition: 0.3s;
  cursor: pointer;
  box-shadow: 0 0 25px rgba(0,255,255,0.15);
}

/* BORDER */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 20px;
  padding: 2px;
  background: linear-gradient(45deg, cyan, magenta, yellow);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
}

/* HOVER EFFECT */
.card:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 0 40px cyan;
}

/* IMAGE */
.card img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin-top: 25px;
  border: 3px solid cyan;
}

/* NAME */
.name {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
  color: cyan;
}

/* BACK BUTTON */
.back-btn {
  display: inline-block;
  margin: 60px;
  padding: 12px 35px;
  border-radius: 30px;
  background: linear-gradient(45deg, cyan, magenta);
  text-decoration: none;
  color: white;
  font-weight: bold;
}

/* FADE */
.fade-out {
  animation: fadeOut 0.4s forwards;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    transform: scale(1.1);
  }
}
</style>
</head>

<body>

<h1>GROUP 1 MEMBERS</h1>

<div class="container">

  <div class="card"
       onmouseenter="playSound('edelyn.mp3')"
       onmouseleave="stopSound()"
       onclick="goToPage('edelynchochesa.html')">
    <img src="edelyn.jpg">
    <div class="name">Edelyn</div>
  </div>

  <div class="card"
       onmouseenter="playSound('jamaica.mp3')"
       onmouseleave="stopSound()"
       onclick="goToPage('jamaicasinangote.html')">
    <img src="jamaica.jpg">
    <div class="name">Jamaica</div>
  </div>

  <div class="card"
       onmouseenter="playSound('jomari.mp3')"
       onmouseleave="stopSound()"
       onclick="goToPage('jomarisingzon.html')">
    <img src="jomari.jpg">
    <div class="name">Jomari</div>
  </div>

  <div class="card"
       onmouseenter="playSound('renalyn.mp3')"
       onmouseleave="stopSound()"
       onclick="goToPage('renalynjabuen.html')">
    <img src="renalyn.jpg">
    <div class="name">Renalyn</div>
  </div>

  <div class="card"
       onmouseenter="playSound('rica.mp3')"
       onmouseleave="stopSound()"
       onclick="goToPage('ricacautiver.html')">
    <img src="rica.jpg">
    <div class="name">Rica</div>
  </div>

</div>

<a href="index.html" class="back-btn">← Back</a>

<script>
let currentSound = null;

function playSound(file) {
  if (currentSound) {
    currentSound.pause();
    currentSound.currentTime = 0;
  }
  currentSound = new Audio(file);
  currentSound.play();
}

function stopSound() {
  if (currentSound) {
    currentSound.pause();
    currentSound.currentTime = 0;
  }
}

function goToPage(link) {
  stopSound(); // stop sound on click
  document.body.classList.add("fade-out");

  setTimeout(() => {
    window.location.href = link;
  }, 400);
}
</script>

</body>
</html>
