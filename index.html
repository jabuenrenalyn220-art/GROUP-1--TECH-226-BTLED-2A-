<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

/* BACKGROUND */
body {
  height: 100vh;
  overflow: hidden;

  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url("bipsu.jpg");

}


/* CONTENT LEFT */
.left {
  position: absolute;
  top: 50%;
  left: 80px;
  transform: translateY(-50%);
  color: white;
  z-index: 2;
}

/* TYPING TEXT */
.typing {
  font-size: 55px;
  font-weight: bold;
  letter-spacing: 3px;
  color: white;

  overflow: hidden;
  white-space: nowrap;

  width: 0;
  border-right: 3px solid white;

  animation: typing 2.5s steps(7) forwards;

}

/* ANIMATIONS */
@keyframes typing {
  from { width: 0 }
  to { width: 350px }
}

@keyframes blink {
  50% { border-color: transparent }
}

/* SUBTEXT */
.left p {
  margin-top: 15px;
  font-size: 18px;
  opacity: 0.8;
}

/* BUTTON */
button {
  margin-top: 30px;
  padding: 15px 40px;
  font-size: 18px;

  border: none;
  border-radius: 50px;

  background: linear-gradient(45deg, gold, orange);
  color: black;

  cursor: pointer;

  transition: 0.3s;
  box-shadow: 0 0 20px gold;
}

/* HOVER */
button:hover {
  transform: scale(1.2);
  box-shadow: 0 0 50px orange;
}

/* CLICK */
button:active {
  transform: scale(0.9);
}

</style>

<script>

/* MUSIC (plays on click para dili ma-block) */
function playMusic() {
  let music = document.getElementById("bgmusic");
  music.play();
}

/* PARTICLES BACKGROUND */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 3;
    this.speedX = Math.random() * 1 - 0.5;
    this.speedY = Math.random() * 1 - 0.5;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;
  }

  draw() {
    ctx.fillStyle = "rgba(255,215,0,0.😎";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function init() {
  for (let i = 0; i < 80; i++) {
    particlesArray.push(new Particle());
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < particlesArray.length; i++) {
    particlesArray[i].update();
    particlesArray[i].draw();
  }

  requestAnimationFrame(animate);
}

init();
animate();

</script>
