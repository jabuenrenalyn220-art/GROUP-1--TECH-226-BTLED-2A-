<!DOCTYPE html>
<html>
<head>
<title>Welcome</title>

<style>
body {
  margin: 0;
  font-family: Arial;

  background: url("bipsu.jpg") no-repeat center center/cover;
  height: 100vh;
}

/* DARK OVERLAY */
.overlay {
  background: rgba(0,0,0,0.5);
  height: 100vh;
  position: relative;
}

/* WELCOME TEXT (CENTER) */
.welcome {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 40px;
  text-align: center;

  animation: fadeIn 2s ease-in-out;
}

/* BUTTON LEFT CENTER */
.btn-container {
  position: absolute;
  top: 50%;
  left: 50px;
  transform: translateY(-50%);
}

/* BUTTON STYLE */
button {
  padding: 15px 30px;
  font-size: 18px;

  border: none;
  border-radius: 30px;

  background: linear-gradient(45deg, gold, orange);
  color: black;

  cursor: pointer;

  transition: 0.3s;
  box-shadow: 0 0 15px gold;
}

/* HOVER EFFECT */
button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px orange;
}

/* ANIMATION TEXT */
@keyframes fadeIn {
  from {opacity: 0; transform: translate(-50%, -70%);}
  to {opacity: 1; transform: translate(-50%, -50%);}
}
</style>

</head>

<body>

<!-- MUSIC -->
<audio autoplay loop hidden>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="overlay">

  <!-- WELCOME TEXT -->
  <div class="welcome">
    WELCOME TO GROUP 1
  </div>

  <!-- BUTTON LEFT -->
  <div class="btn-container">
    <a href="group1.html">
      <button>ENTER</button>
    </a>
  </div>

</div>

</body>
</html>
